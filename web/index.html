<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="머니플로우 — 자산·지출·신용카드 한눈에 보는 가계부">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="머니플로우">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>머니플로우</title>
  <link rel="manifest" href="manifest.json">

  <!-- Pretendard 폰트 preload — CanvasKit이 fetch 시작 전에 브라우저가 미리
       받아서 첫 paint 때 한글 글리프 누락(엑박) 방지 -->
  <link rel="preload" href="assets/fonts/Pretendard-Regular.otf" as="font" type="font/otf" crossorigin="anonymous">
  <link rel="preload" href="assets/fonts/Pretendard-Medium.otf" as="font" type="font/otf" crossorigin="anonymous">
  <link rel="preload" href="assets/fonts/Pretendard-SemiBold.otf" as="font" type="font/otf" crossorigin="anonymous">
  <link rel="preload" href="assets/fonts/Pretendard-Bold.otf" as="font" type="font/otf" crossorigin="anonymous">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
