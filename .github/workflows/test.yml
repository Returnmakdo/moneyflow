name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          # 로컬 개발 SDK와 동일 버전 고정 — stable floating 시 새 lint로
          # 예기치 않게 깨지는 것 방지. SDK 올릴 때 이 값도 함께 갱신.
          flutter-version: 3.41.7
          cache: true

      - run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Unit tests
        run: flutter test
